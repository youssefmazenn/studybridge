# PostgreSQL production profile.
# Start with: SPRING_PROFILES_ACTIVE=prod mvn spring-boot:run
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/studybridge}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME:studybridge}
spring.datasource.password=${DATABASE_PASSWORD:studybridge}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.h2.console.enabled=false

# Connection pool tuned for serverless Postgres (e.g. Neon free tier, which auto-suspends when idle).
# Allowing the pool to drop to zero avoids holding connections that the database has already closed.
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:5}
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.idle-timeout=30000
