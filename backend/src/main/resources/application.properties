spring.application.name=studybridge
server.port=${PORT:8080}
spring.profiles.default=dev
spring.jpa.properties.hibernate.format_sql=true

# JWT — development secret (>= 32 bytes). In production set JWT_SECRET via environment variable.
# Example: export JWT_SECRET="$(openssl rand -base64 48)"
jwt.secret=${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS: React (Vite) dev server
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# Uploaded course documents
app.upload-dir=${UPLOAD_DIR:uploads/documents}
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Translation provider
# Options: deepl (default), mymemory, local (offline echo for demos/tests).
app.translation.provider=${TRANSLATION_PROVIDER:deepl}
app.translation.max-characters=${TRANSLATION_MAX_CHARACTERS:8000}

# DeepL (default). Free keys end with ":fx" and are auto-routed to the free host; Pro keys use the
# paid host. Set the key via DEEPL_API_KEY (see backend/.env). Leave base-url blank for auto-detect.
app.translation.deepl.api-key=${DEEPL_API_KEY:}
app.translation.deepl.base-url=${DEEPL_BASE_URL:}

# MyMemory (fallback). A valid email raises its free daily limit from ~5,000 to ~50,000 words.
app.translation.mymemory.base-url=${TRANSLATION_BASE_URL:https://api.mymemory.translated.net}
app.translation.mymemory.email=${TRANSLATION_EMAIL:}

# Email reminders
app.reminders.email.enabled=${REMINDER_EMAIL_ENABLED:false}
app.reminders.email.from=${REMINDER_EMAIL_FROM:no-reply@studybridge.local}
app.reminders.email.poll-ms=${REMINDER_EMAIL_POLL_MS:60000}
app.reminders.email.initial-delay-ms=${REMINDER_EMAIL_INITIAL_DELAY_MS:10000}
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
