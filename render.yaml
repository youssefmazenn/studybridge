# Render Blueprint for the StudyBridge backend.
# In Render: New + > Blueprint > pick this repo. It reads this file and creates the service.
# Values marked "sync: false" are NOT in the repo — set them in the Render dashboard after creation.
services:
  - type: web
    name: studybridge-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JPA_DDL_AUTO
        value: update
      - key: TRANSLATION_PROVIDER
        value: deepl
      # Neon connection (see DEPLOYMENT.md for how to derive these three):
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      # Secrets:
      - key: JWT_SECRET
        sync: false
      - key: DEEPL_API_KEY
        sync: false
      # Comma-separated emails that receive ADMIN role on login/registration:
      - key: ADMIN_EMAILS
        sync: false
      - key: EMAIL_VERIFICATION_ENABLED
        value: "false"
      - key: EMAIL_VERIFICATION_PROVIDER
        value: smtp
      - key: FRONTEND_BASE_URL
        sync: false
      - key: EMAIL_VERIFICATION_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
      # SMTP settings used by email verification and optional reminder emails:
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_SMTP_AUTH
        value: "true"
      - key: MAIL_SMTP_STARTTLS
        value: "true"
      - key: MAIL_SMTP_STARTTLS_REQUIRED
        value: "true"
      - key: MAIL_DEBUG
        value: "false"
      # Comma-separated allowed origins = your Vercel frontend URL (set after the frontend is live):
      - key: CORS_ORIGINS
        sync: false
